<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nymbus — Calendar</title>
    <!-- Google Analytics — replace G-MX3WTKFV32 with your Measurement ID from analytics.google.com -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MX3WTKFV32"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-MX3WTKFV32');
    </script>
    <style>
        :root {
            --bg:#0d0d0d; --bg2:#141414; --bg3:#1a1a1a;
            --border:#1e1e1e; --border2:#222; --border3:#2a2a2a;
            --text:#ccc; --text-bright:#e8e8e8; --text-muted:#888;
            --text-dim:#555; --text-dimmer:#444; --input-bg:#111;
            --nav-bg:#0d0d0d;
        }
        [data-theme="light"] {
            --bg:#f2f2f7; --bg2:#ffffff; --bg3:#f8f8fc;
            --border:#e4e4ec; --border2:#d0d0dc; --border3:#c0c0cc;
            --text:#333; --text-bright:#111; --text-muted:#666;
            --text-dim:#777; --text-dimmer:#999; --input-bg:#fff;
            --nav-bg:#fff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: Arial, sans-serif; color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 2.5rem;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: var(--nav-bg); z-index: 50;
            transition: background 0.3s, border-color 0.3s;
        }
        .logo { font-size: 18px; font-weight: bold; color: var(--text-bright); text-decoration: none; }
        .logo span { color: #7f77dd; }
        .nav-right { display: flex; align-items: center; gap: 16px; }
        .nav-greeting { font-size: 13px; color: var(--text-dimmer); }
        .nav-greeting span { color: #7f77dd; }
        .btn-logout {
            background: transparent; border: 1px solid var(--border3);
            color: var(--text-dim); padding: 6px 16px; border-radius: 6px;
            cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .btn-logout:hover { border-color: #c46a6a; color: #c46a6a; }
        .btn-theme {
            background: transparent; border: 1px solid var(--border3);
            color: var(--text-dim); padding: 5px 9px; border-radius: 6px;
            cursor: pointer; font-size: 15px; transition: all 0.2s; line-height: 1;
        }
        .btn-theme:hover { border-color: #7f77dd; color: #7f77dd; }
        .nav-link {
            font-size: 13px; color: var(--text-muted); text-decoration: none;
            border: 1px solid var(--border3); padding: 6px 16px; border-radius: 6px;
            transition: all 0.2s;
        }
        .nav-link:hover { border-color: #7f77dd; color: #7f77dd; }

        .container { max-width: 980px; margin: 0 auto; padding: 2rem 1.5rem; }

        .hero { margin-bottom: 1.5rem; }
        .hero h1 { font-size: 26px; color: var(--text-bright); font-weight: bold; margin-bottom: 4px; }
        .hero h1 span { color: #7f77dd; }
        .hero p { font-size: 14px; color: var(--text-dimmer); }

        /* LEGEND */
        .legend { display: flex; gap: 20px; margin-bottom: 1.5rem; }
        .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-dim); }
        .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
        .legend-dot.applied { background: #d4a847; }
        .legend-dot.interview { background: #6a9fd8; }

        /* INTERVIEW PROMPTS */
        .prompts-section { margin-bottom: 1.5rem; }
        .prompts-title { font-size: 11px; color: var(--text-dimmer); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
        .prompt-card {
            background: var(--bg2); border: 1px solid var(--border);
            border-left: 3px solid #6a9fd8;
            border-radius: 8px; padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 8px; flex-wrap: wrap; gap: 10px;
            transition: background 0.3s, border-color 0.3s;
        }
        .prompt-info { font-size: 13px; color: var(--text); }
        .prompt-info span { color: #6a9fd8; font-weight: bold; }
        .prompt-controls { display: flex; align-items: center; gap: 8px; }
        .prompt-controls input[type="date"] {
            background: var(--input-bg); border: 1px solid var(--border3); border-radius: 6px;
            padding: 6px 10px; color: var(--text); font-size: 12px; color-scheme: dark;
            transition: background 0.3s, border-color 0.3s;
        }
        [data-theme="light"] .prompt-controls input[type="date"] { color-scheme: light; }
        .btn-set-date {
            background: #6a9fd8; border: none; color: #fff;
            padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer;
            transition: background 0.2s;
        }
        .btn-set-date:hover { background: #5a8fc8; }

        /* CALENDAR */
        .cal-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1rem;
        }
        .cal-title { font-size: 18px; color: var(--text-bright); font-weight: bold; }
        .cal-nav {
            background: var(--bg2); border: 1px solid var(--border); color: var(--text);
            padding: 6px 16px; border-radius: 6px; cursor: pointer;
            font-size: 13px; transition: all 0.2s;
        }
        .cal-nav:hover { border-color: #7f77dd; color: #7f77dd; }

        .cal-grid { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: background 0.3s, border-color 0.3s; }
        .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--border); }
        .cal-weekday { padding: 10px; text-align: center; font-size: 11px; color: var(--text-dimmer); text-transform: uppercase; letter-spacing: 0.6px; }
        .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); }

        .cal-day {
            min-height: 90px; padding: 8px;
            border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .cal-day:nth-child(7n) { border-right: none; }
        .cal-day.other-month { opacity: 0.25; }
        .cal-day.today .day-num {
            background: #7f77dd; color: #fff; border-radius: 50%;
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
        }
        .day-num {
            font-size: 12px; color: var(--text-dim); margin-bottom: 5px;
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
        }
        .day-events { display: flex; flex-direction: column; gap: 3px; }
        .day-event {
            font-size: 10px; padding: 2px 6px; border-radius: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            cursor: default;
        }
        .day-event.applied { background: #2a2820; color: #d4a847; border-left: 2px solid #d4a847; }
        [data-theme="light"] .day-event.applied { background: #fdf6e0; }
        .day-event.interview { background: #1e2535; color: #6a9fd8; border-left: 2px solid #6a9fd8; animation: interviewGlow 2.5s ease-in-out infinite; }
        [data-theme="light"] .day-event.interview { background: #e8f0fb; }
        @keyframes interviewGlow {
            0%, 100% { box-shadow: none; }
            50% { box-shadow: 0 0 7px 1px #6a9fd844; }
        }

        /* DAY DETAIL OVERLAY */
        .overlay {
            display: flex; position: fixed; inset: 0;
            background: #000000aa; z-index: 100;
            align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.22s ease;
        }
        .overlay.show { opacity: 1; pointer-events: auto; }
        .overlay .popup {
            transform: scale(0.92) translateY(10px);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .overlay.show .popup { transform: scale(1) translateY(0); }
        .popup {
            background: var(--bg3); border: 1px solid var(--border3);
            border-radius: 12px; padding: 2rem; width: 420px;
            max-width: 90vw; transition: background 0.3s;
        }
        .popup h3 { color: var(--text-bright); font-size: 16px; margin-bottom: 1rem; }
        .popup-event { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .popup-event:last-child { border-bottom: none; }
        .popup-event-company { color: var(--text-bright); font-weight: bold; }
        .popup-event-role { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
        .popup-event-type { font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .popup-event-type.applied { color: #d4a847; }
        .popup-event-type.interview { color: #6a9fd8; }
        .btn-cancel {
            background: transparent; border: 1px solid var(--border3); color: var(--text-dim);
            padding: 8px 24px; border-radius: 6px; cursor: pointer;
            font-size: 13px; margin-top: 1rem; transition: all 0.2s;
        }
        .btn-cancel:hover { color: var(--text); border-color: var(--text-muted); }

        /* BOTTOM NAV (mobile only) */
        .bottom-nav {
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg2); border-top: 1px solid var(--border); z-index: 50;
            justify-content: space-around; padding: 8px 0 12px;
            transition: background 0.3s, border-color 0.3s;
        }
        .bottom-nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            color: var(--text-dimmer); font-size: 10px; text-decoration: none;
            padding: 4px 24px; transition: color 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .bottom-nav-item svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; }
        .bottom-nav-item.active { color: #7f77dd; }

        /* MOBILE */
        @media (max-width: 768px) {
            nav { padding: 0.85rem 1.25rem; }
            .nav-greeting { display: none; }
            .container { padding: 1.25rem 1rem; padding-bottom: 80px; }
            .hero h1 { font-size: 20px; }
            .cal-day { min-height: 60px; padding: 5px; }
            .day-num { font-size: 11px; width: 20px; height: 20px; }
            .day-event { font-size: 9px; padding: 2px 4px; }
            .cal-weekday { font-size: 9px; padding: 7px 2px; }
            .prompt-card { flex-direction: column; align-items: flex-start; }
            .cal-title { font-size: 15px; }
            .bottom-nav { display: flex; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">Nym<span>bus</span></a>
        <div class="nav-right">
            <span class="nav-greeting">Hey, <span id="userGreeting"></span> !👋</span>
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <button class="btn-theme" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
            <button class="btn-logout" onclick="logout()">logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>Your <span>calendar</span></h1>
            <p>Track application dates and upcoming interviews</p>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="legend-dot applied"></div> Applied date</div>
            <div class="legend-item"><div class="legend-dot interview"></div> Interview date</div>
        </div>

        <div class="prompts-section" id="promptsSection" style="display:none;">
            <div class="prompts-title">Interviews missing a date — set them now</div>
            <div id="promptsList"></div>
        </div>

        <div class="cal-header">
            <button class="cal-nav" onclick="prevMonth()">← Prev</button>
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="cal-title" id="calTitle"></div>
                <button class="cal-nav" onclick="goToToday()" style="font-size:11px; padding:4px 12px;">Today</button>
            </div>
            <button class="cal-nav" onclick="nextMonth()">Next →</button>
        </div>

        <div class="cal-grid">
            <div class="cal-weekdays">
                <div class="cal-weekday">Sun</div>
                <div class="cal-weekday">Mon</div>
                <div class="cal-weekday">Tue</div>
                <div class="cal-weekday">Wed</div>
                <div class="cal-weekday">Thu</div>
                <div class="cal-weekday">Fri</div>
                <div class="cal-weekday">Sat</div>
            </div>
            <div class="cal-days" id="calDays"></div>
        </div>
    </div>

    <div class="overlay" id="dayOverlay">
        <div class="popup">
            <h3 id="dayOverlayTitle"></h3>
            <div id="dayOverlayEvents"></div>
            <button class="btn-cancel" onclick="document.getElementById('dayOverlay').classList.remove('show')">Close</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/dashboard" class="bottom-nav-item">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Dashboard
        </a>
        <a href="/calendar" class="bottom-nav-item active">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
            Calendar
        </a>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script>
        // Theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('themeToggle').textContent = '☀️';
        }
        function toggleTheme() {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
            localStorage.setItem('theme', isLight ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = isLight ? '🌙' : '☀️';
        }
    </script>
    <script src="calendar.js"></script>
</body>
</html>
