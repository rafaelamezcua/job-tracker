<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #111; font-family: Arial, sans-serif; color: #ccc; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 2.5rem; width: 380px; }
        .logo { font-size: 22px; font-weight: bold; color: #e8e8e8; margin-bottom: 0.5rem; }
        .logo span { color: #7f77dd; }
        .subtitle { font-size: 13px; color: #444; margin-bottom: 2rem; }
        label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
        input { width: 100%; background: #222; border: 1px solid #2a2a2a; border-radius: 6px; padding: 10px 14px; color: #ccc; font-size: 13px; margin-bottom: 1.25rem; }
        input:focus { outline: none; border-color: #7f77dd; }
        input::placeholder { color: #444; }
        .btn-login { width: 100%; background: #7f77dd; color: #fff; border: none; border-radius: 6px; padding: 11px; font-size: 14px; cursor: pointer; margin-bottom: 10px; }
        .btn-login:hover { background: #6e66cc; }
        .btn-register { width: 100%; background: transparent; color: #888; border: 1px solid #2a2a2a; border-radius: 6px; padding: 11px; font-size: 14px; cursor: pointer; }
        .btn-register:hover { border-color: #7f77dd; color: #7f77dd; }
        .error { color: #c46a6a; font-size: 13px; margin-top: 12px; min-height: 20px; }
        .divider { border: none; border-top: 1px solid #222; margin: 1.25rem 0; } #nameField { display: none; margin-bottom: 1.25rem; }
    </style>
</head>
<body>
    
    <div class="box">
        <a href="/" class="logo" style="text-decoration:none; color:#e8e8e8;">Job<span>Tracker</span></a>
        <div class="subtitle">Track your applications in one place</div>

        <div id="nameField">
            <label>name</label>
             <input type="text" id="name" placeholder="your name" />
        </div>

        <label>email</label>
            <input type="email" id="email" placeholder="you@email.com" />

        <label>password</label>
        <input type="password" id="password" placeholder="••••••••" />

        <button class="btn-login" onclick="login()">Login</button>
        <hr class="divider">
        <button class="btn-register" onclick="register()">Create account</button>

        <div class="error" id="error"></div>
    </div>

    <script>
        async function login() {
    document.getElementById('nameField').style.display = 'none';
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    if (data.error) {
        document.getElementById('error').textContent = data.error;
    } else {
        localStorage.setItem('token', data.token);
        localStorage.setItem('userName', data.name);
        window.location.href = '/dashboard';
    }
}

        async function register() {
             document.getElementById('nameField').style.display = 'block';
             const name = document.getElementById('name').value;
             if (!name) {
                 document.getElementById('error').textContent = 'please enter your name';
                 return;
    }
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, name })
            });

            const data = await res.json();
            if (data.error) {
                document.getElementById('error').textContent = data.error;
            } else {
                document.getElementById('error').style.color = '#5aad6a';
                document.getElementById('error').textContent = 'account created! please login.';
            }
        }
    </script>
</body>
</html>
